name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Swift
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.3.3"
        
      - name: Cache Swift packages
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-
            
      - name: Build
        run: swift build -v
        
      - name: Test
        run: swift test -v
        
      - name: Build Release
        run: swift build -c release -v
        
      - name: Upload Release Binary
        uses: actions/upload-artifact@v4
        with:
          name: focusrelay-macos
          path: .build/release/focusrelay
          if-no-files-found: error
          retention-days: 5
